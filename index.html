<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --text:       #191F28;
  --text-sub:   #6B7684;
  --text-muted: #ADB5BD;
  --border:     #E5E8EB;
  --border2:    #CDD1D6;
  --bg:         #FFFFFF;
  --surface:    #F9FAFB;
  --accent:     #0064FF;
  --accent-bg:  #EBF3FF;
  --r:          4px;
  --r2:         6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: var(--text);
  font-size: 14px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--accent); text-decoration: none; }
strong { font-weight: 600; }

.page {
  max-width: 880px;
  margin: 0 auto;
  padding: 80px 48px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ── Header ── */
.name {
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.2;
}

.title-line {
  font-size: 15px;
  color: var(--text-sub);
  margin-top: 6px;
}

.contact-row {
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  margin-top: 22px;
  font-size: 13px;
  color: var(--text-sub);
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 7px;
}

.contact-item svg {
  opacity: 0.35;
  flex-shrink: 0;
}

.summary {
  margin-top: 26px;
  font-size: 14px;
  line-height: 1.8;
  max-width: 680px;
  padding-left: 14px;
  border-left: 2px solid var(--border2);
  color: var(--text-sub);
}

/* ── Divider ── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 44px 0;
}

/* ── Cards ── */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 26px 28px;
  background: #fff;
  display: flex;
  flex-direction: column;
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.card-meta {
  font-size: 12.5px;
  color: var(--text-sub);
  margin-top: 6px;
  line-height: 1.65;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 22px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 12px;
  border-radius: var(--r);
  font-size: 12.5px;
  font-weight: 500;
  border: 1px solid var(--border);
  color: var(--text-sub);
  background: #fff;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}

.btn:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border2);
}

.btn.primary {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}

.btn.primary:hover {
  background: var(--accent);
  color: #fff;
}

.btn svg { flex-shrink: 0; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .page { padding: 56px 24px; }
  .name { font-size: 30px; }
  .cards { grid-template-columns: 1fr; gap: 12px; }
  .contact-row { gap: 14px; font-size: 12.5px; }
  .summary { font-size: 13.5px; }
  .divider { margin: 32px 0; }
}
</style>
</head>
<body>
